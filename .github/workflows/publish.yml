name: Publish VS Code Extension

on:
    push:
        tags:
            - 'v*.*.*'

permissions:
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest

        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

            - name: Package extension
              run: pnpm exec vsce package --out extension.vsix

            - name: Publish to VS Code Marketplace
              run: pnpm exec vsce publish --packagePath extension.vsix --pat ${{ secrets.VSCE_PAT }}

            - name: Publish to Open VSX
              run: pnpm exec ovsx publish extension.vsix --pat ${{ secrets.OVSX_TOKEN }}